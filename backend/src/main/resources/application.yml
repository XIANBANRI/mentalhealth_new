server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mental_health}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3s

  cache:
    type: redis
    cache-names:
      - studentProfile
      - teacherProfile
      - counselorProfile
      - adminProfile
      - assessmentScale
      - assessmentScaleDetail
      - assessmentScaleFull
      - teacherSchedule
      - availableAppointment
    redis:
      time-to-live: 30m
      cache-null-values: false
      use-key-prefix: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sl.mentalhealth.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

app:
  upload:
    avatar-root-dir: ${APP_UPLOAD_AVATAR_ROOT_DIR:/app/uploads/avatar}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:8081,http://localhost:8082,http://localhost:5173}

  kafka:
    student-profile-timeout-seconds: 10
    teacher-profile-timeout-seconds: 8
    counselor-profile-timeout-seconds: 10
    admin-profile-timeout-seconds: 10

  jwt:
    expire-seconds: 86400
    header: Authorization
    token-prefix: Bearer

  redis:
    login-token-prefix: "login:token:"
    login-token-ttl-minutes: 1440

logging:
  level:
    com.sl.mentalhealth.mapper: debug