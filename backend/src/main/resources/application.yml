server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mental_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 18827354387lp!
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 3s

  cache:
    type: redis
    cache-names:
      - studentProfile
      - teacherProfile
      - counselorProfile
      - adminProfile
      - assessmentScale
      - assessmentScaleDetail
      - assessmentScaleFull
      - teacherSchedule
      - availableAppointment
    redis:
      time-to-live: 30m
      cache-null-values: false
      use-key-prefix: true

  kafka:
    bootstrap-servers: localhost:9092

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sl.mentalhealth.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

app:
  upload:
    avatar-root-dir: E:/mental_health/backend/uploads/avatar

  kafka:
    student-profile-timeout-seconds: 10
    teacher-profile-timeout-seconds: 8
    counselor-profile-timeout-seconds: 10
    admin-profile-timeout-seconds: 10

  jwt:
    expire-seconds: 86400
    header: Authorization
    token-prefix: Bearer

  redis:
    login-token-prefix: "login:token:"
    login-token-ttl-minutes: 1440

logging:
  level:
    com.sl.mentalhealth.mapper: debug